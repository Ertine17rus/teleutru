<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Teleut App</title>

  <!-- Иконка сайта: положи файл сюда images/favicon.ico -->
  <link rel="icon" href="favicon.ico" />

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="app">
    <h1 id="title">Телеут → Орус сöзлик</h1>

    <input id="search" placeholder="Педреерге" autocomplete="off" />

    <!-- клавиатура -->
    <div class="keyboard">
      <button type="button" onclick="add('Ј')">Ј</button>
      <button type="button" onclick="add('ј')">ј</button>
      <button type="button" onclick="add('Қ')">Қ</button>
      <button type="button" onclick="add('қ')">қ</button>
      <button type="button" onclick="add('Ң')">Ң</button>
      <button type="button" onclick="add('ң')">ң</button>
      <button type="button" onclick="add('Ғ')">Ғ</button>
      <button type="button" onclick="add('ғ')">ғ</button>
      <button type="button" onclick="add('Ö')">Ö</button>
      <button type="button" onclick="add('ö')">ö</button>
      <button type="button" onclick="add('Ӱ')">Ӱ</button>
      <button type="button" onclick="add('ӱ')">ӱ</button>
    </div>

    <div id="content"></div>
  </div>

  <div id="modal"></div>

  <!-- нижнее меню -->
<div class="tabs">
  <button type="button" id="tab-tl" onclick="switchTab('tl')">Телеут сöзтöр|телеутские слова</button>
  <button type="button" id="tab-ru" onclick="switchTab('ru')">Орус сöстöр|Русские слова</button>
  <button type="button" id="tab-abc" onclick="switchTab('abc')">Палдарга|Детям</button>
  <button type="button" id="tab-about" onclick="switchTab('about')">О проекте❤️</button>
</div>
  <script src="app.js"></script>
</body>
</html>
